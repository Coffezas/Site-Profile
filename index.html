<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffe - Programador Amador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            margin: 0;
        }

        /* Estrelas no fundo */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Detalhes vermelhos */
        .red-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .red-glow-1 { top: -200px; left: -200px; }
        .red-glow-2 { bottom: -200px; right: -200px; }

        .red-accent {
            position: fixed;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, #dc2626, transparent);
            pointer-events: none;
            z-index: 0;
        }

        .red-accent-1 { top: 10%; left: 10%; transform: rotate(45deg); }
        .red-accent-2 { top: 20%; right: 15%; transform: rotate(-30deg); }
        .red-accent-3 { bottom: 15%; left: 20%; transform: rotate(60deg); }
        .red-accent-4 { bottom: 25%; right: 10%; transform: rotate(-45deg); }

        /* Container principal */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Card do perfil */
        .profile-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            margin-bottom: 16px;
            transition: transform 0.1s ease-out;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(220, 38, 38, 0.5), transparent);
        }

        /* Avatar */
        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border: 3px solid rgba(220, 38, 38, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #dc2626;
            position: relative;
            margin: 0 auto;
        }

        .avatar::before { content: '☕'; }

        .avatar-ring {
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%;
            border: 2px solid rgba(220, 38, 38, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .name { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .bio { font-size: 15px; color: #a1a1aa; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .bio::before { content: ''; width: 4px; height: 4px; background: #dc2626; border-radius: 50%; }
        
        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc2626, transparent);
            margin: 24px auto;
            opacity: 0.5;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #ef4444;
        }

        .status-dot { width: 6px; height: 6px; background: #dc2626; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Discord */
        .discord-simple {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(88, 101, 242, 0.2);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 12px;
        }

        .discord-simple:hover { border-color: rgba(88, 101, 242, 0.5); transform: translateY(-2px); }

        .discord-icon-simple {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        .discord-info { flex: 1; text-align: left; }
        .discord-name-simple { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .discord-stats-simple { display: flex; gap: 12px; font-size: 12px; color: #96989d; }
        
        /* NOVOS BOTÕES: GITHUB E INSTAGRAM */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        .social-item {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .social-item:hover {
            border-color: rgba(220, 38, 38, 0.4);
            background: rgba(220, 38, 38, 0.05);
            transform: translateY(-2px);
        }

        .social-icon { font-size: 18px; }

        @media (max-width: 480px) {
            .name { font-size: 32px; }
            .social-grid { gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="red-glow red-glow-1"></div>
    <div class="red-glow red-glow-2"></div>
    <div class="red-accent red-accent-1"></div>
    <div class="red-accent red-accent-2"></div>
    <div class="red-accent red-accent-3"></div>
    <div class="red-accent red-accent-4"></div>

    <div class="container">
        <div class="profile-card">
            <div class="avatar-container">
                <div class="avatar-ring"></div>
                <div class="avatar"></div>
            </div>
            <h1 class="name">Coffe</h1>
            <p class="bio">Programador Amador</p>
            <div class="divider"></div>
            <div class="status">
                <span class="status-dot"></span>
                <span>Disponível para projetos</span>
            </div>
        </div>

        <a href="https://discord.gg/platformdestroyer" target="_blank" class="discord-simple">
            <div class="discord-icon-simple">💬</div>
            <div class="discord-info">
                <div class="discord-name-simple">Platform Destroyer</div>
                <div class="discord-stats-simple">
                    <span style="display:flex; align-items:center; gap:4px;"><span style="width:5px;height:5px;background:#3ba55d;border-radius:50%"></span> <span id="discordOnline">13.219</span> online</span>
                    <span style="display:flex; align-items:center; gap:4px;"><span style="width:5px;height:5px;background:#96989d;border-radius:50%"></span> <span id="discordTotal">400.932</span> membros</span>
                </div>
            </div>
            <div style="color:#96989d">→</div>
        </a>

        <div class="social-grid">
            <a href="https://github.com/SEU-USUARIO" target="_blank" class="social-item">
                <span class="social-icon">💻</span>
                <span>GitHub</span>
            </a>
            <a href="https://instagram.com/SEU-USUARIO" target="_blank" class="social-item">
                <span class="social-icon">📸</span>
                <span>Instagram</span>
            </a>
        </div>
    </div>

    <script>
        // ESTRELAS
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // DISCORD STATS
        let baseOnline = 13219;
        let baseTotal = 400932;
        function updateDiscordStats() {
            const variation = Math.floor(Math.random() * 20) - 10;
            const onlineVariation = Math.floor(Math.random() * 100) - 50;
            document.getElementById('discordOnline').textContent = (baseOnline + onlineVariation).toLocaleString('pt-BR');
            document.getElementById('discordTotal').textContent = (baseTotal + variation).toLocaleString('pt-BR');
        }
        setInterval(updateDiscordStats, 5000);

        // EFEITO 3D MOUSE
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth - 0.5;
            const mouseY = e.clientY / window.innerHeight - 0.5;
            const card = document.querySelector('.profile-card');
            card.style.transform = `perspective(1000px) rotateY(${mouseX * 5}deg) rotateX(${-mouseY * 5}deg)`;
        });
    </script>
</body>
</html>
